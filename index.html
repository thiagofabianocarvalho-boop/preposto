<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filtratech — Monitoramento Diário de Cloro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B5E20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Filtratech">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0D2818;--ocean:#1B5E20;--sky:#4CAF50;--ice:#E8F5E9;--mist:#F1F8F1;--go:#1B7A40;--go-l:#EBF7F0;--warn:#B45309;--warn-l:#FEF3C7;--stop:#B91C1C;--stop-l:#FEF2F2;--slate:#475569;--ghost:#94A3B8;--font-h:'Fraunces',serif;--font-b:'DM Sans',sans-serif}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;padding:0;background-color:var(--mist);color:var(--ink);font-family:var(--font-b);line-height:1.5;display:flex;flex-direction:column;align-items:center}
  header{width:100%;max-width:560px;padding:32px 20px;background:linear-gradient(135deg,var(--ocean),var(--ink));color:#fff;border-radius:0 0 24px 24px;box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;margin-bottom:24px}
  header h1{font-family:var(--font-h);font-size:28px;margin:0;letter-spacing:-0.5px}
  header p{opacity:0.8;font-size:14px;margin:8px 0 0}
  main{width:100%;max-width:560px;padding:0 16px 100px}
  .card{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 4px 15px rgba(13,40,24,0.04);border:1px solid rgba(0,0,0,0.03)}
  .card-title{font-family:var(--font-h);font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;color:var(--ocean)}
  .input-group{margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--slate);text-transform:uppercase;letter-spacing:0.5px}
  input,select,textarea{width:100%;padding:14px;border:1.5px solid #E2E8F0;border-radius:12px;font-size:16px;font-family:var(--font-b);transition:all 0.2s;color:var(--ink);background-color:#fff}
  input:focus,select:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 4px var(--ice)}
  input::placeholder{color:var(--ghost)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);font-family:var(--font-b)}
  .btn-primary{background:var(--ocean);color:#fff;box-shadow:0 8px 20px rgba(27,94,32,0.25)}
  .btn-primary:active{transform:scale(0.98);box-shadow:0 4px 10px rgba(27,94,32,0.2)}
  .btn-primary:disabled{background:var(--ghost);box-shadow:none;cursor:not-allowed;opacity:0.6}
  .btn-secondary{background:var(--mist);color:var(--ocean);border:1px solid var(--ice)}
  .status-box{display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase;margin-top:8px;min-height:36px;transition:all 0.3s}
  .status-box.sucesso{background:var(--go-l);color:var(--go)}
  .status-box.alerta{background:var(--warn-l);color:var(--warn)}
  .status-box.erro{background:var(--stop-l);color:var(--stop)}
  .ponto-row{padding:16px;background:var(--mist);border-radius:16px;margin-bottom:12px;border:1px solid rgba(0,0,0,0.02)}
  .ponto-name{font-weight:600;font-size:14px;margin-bottom:12px;color:var(--ocean);display:block}
  .folga-toggle{display:flex;background:var(--ice);padding:6px;border-radius:12px;margin-bottom:20px}
  .folga-toggle button{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--slate)}
  .folga-toggle button.active{background:#fff;color:var(--ocean);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
  .hidden{display:none}
  footer{position:fixed;bottom:0;width:100%;max-width:560px;padding:16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);z-index:100;border-top:1px solid rgba(0,0,0,0.05)}
  .loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:2000}
  .spinner{width:40px;height:40px;border:4px solid var(--ice);border-top:4px solid var(--ocean);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  #msg-feedback{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:16px 24px;border-radius:12px;color:#fff;font-weight:600;z-index:3000;box-shadow:0 10px 25px rgba(0,0,0,0.2);display:none;width:90%;max-width:400px;text-align:center;animation:slideDown 0.4s cubic-bezier(0.18,0.89,0.32,1.28)}
  @keyframes slideDown{from{top:-100px;opacity:0}to{top:20px;opacity:1}}
  #btn-whats{position:fixed;bottom:90px;right:20px;background:#25D366;color:#fff;width:56px;height:56px;border-radius:50%;display:none;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(37,211,102,0.4);z-index:900;text-decoration:none;transition:transform 0.3s}
  #btn-whats:active{transform:scale(1.1)}
  .calendar-container{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,0.04);margin-bottom:20px}
  .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
  .cal-header h3{margin:0;font-family:var(--font-h);font-size:16px;color:var(--ocean)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
  .cal-day-label{font-size:10px;font-weight:700;color:var(--ghost);text-transform:uppercase;padding-bottom:5px}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:8px;cursor:pointer;position:relative;border:1px solid transparent}
  .cal-day:hover{background:var(--ice)}
  .cal-day.today{border-color:var(--ocean);font-weight:700;color:var(--ocean)}
  .cal-day.has-data{background:var(--go-l);color:var(--go);font-weight:600}
  .cal-day.has-anomalia{background:var(--stop-l);color:var(--stop);font-weight:600}
  .cal-day.is-folga{background:var(--slate);color:#fff;opacity:0.4}
  .cal-day.empty{cursor:default}
  .cal-day.empty:hover{background:none}
</style>
</head>
<body>

<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text" style="margin-top:16px;font-weight:600;color:var(--ocean)">Enviando dados...</p>
</div>

<div id="msg-feedback"></div>

<a id="btn-whats" href="#" target="_blank">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 8.38 0 0 1 3.8.9L21 3z"></path></svg>
</a>

<header>
  <h1>Filtratech Ambiental</h1>
  <p id="cliente-header">Monitoramento de Cloro</p>
</header>

<main>
  <div class="folga-toggle">
    <button id="btn-dia-util" class="active" onclick="setModo('util')">Dia Útil</button>
    <button id="btn-folga" onclick="setModo('folga')">Folga / Não mediu</button>
  </div>

  <form id="form-cloro">
    <div class="card">
      <div class="card-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        Identificação
      </div>
      <div class="input-group">
        <label for="campo-funcionario">Nome do Funcionário</label>
        <input type="text" id="campo-funcionario" placeholder="Quem está medindo?" required>
      </div>
      <div class="input-group">
        <label for="campo-data">Data da Medição</label>
        <input type="date" id="campo-data" required>
      </div>
    </div>

    <div id="sec-hidrometro" class="card hidden">
      <div class="card-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        Leitura do Hidrômetro
      </div>
      <div class="input-group">
        <label for="campo-hidro">Valor Atual (m³)</label>
        <input type="number" step="0.001" id="campo-hidro" placeholder="0.000">
      </div>
    </div>

    <div id="sec-medicao" class="card">
      <div class="card-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
        Níveis de Cloro (mg/L)
      </div>
      
      <div id="container-pontos">
        </div>

      <div id="campo-ph-container" class="input-group hidden" style="margin-top:20px; padding-top:20px; border-top:1px solid #eee;">
        <label for="campo-ph">Potencial Hidrogeniônico (pH)</label>
        <input type="number" step="0.1" id="campo-ph" placeholder="Ex: 7.2" oninput="atualizarBtn()">
      </div>
    </div>

    <div id="sec-folga" class="card hidden">
      <div class="card-title">Motivo</div>
      <select id="motivo-folga" onchange="atualizarBtn()">
        <option value="FOLGA">Folga / Final de semana</option>
        <option value="FERIADO">Feriado</option>
        <option value="FALTA_ENERGIA">Falta de Energia</option>
        <option value="MANUTENCAO">Manutenção no Sistema</option>
        <option value="OUTRO">Outro motivo</option>
      </select>
      <div class="input-group" style="margin-top:15px">
        <label>Observações</label>
        <textarea id="obs-folga" rows="2" placeholder="Opcional..."></textarea>
      </div>
    </div>

    <div class="calendar-container">
      <div class="cal-header">
        <button type="button" onclick="calNavegar(-1)" class="btn-secondary" style="padding:5px 10px; width:auto; border-radius:8px">←</button>
        <h3 id="cal-mes-ano">Mês Ano</h3>
        <button type="button" onclick="calNavegar(1)" class="btn-secondary" style="padding:5px 10px; width:auto; border-radius:8px">→</button>
      </div>
      <div id="cal-grid" class="cal-grid">
        </div>
      <div style="margin-top:15px; display:flex; gap:10px; font-size:10px; font-weight:700; justify-content:center; text-transform:uppercase">
        <span style="display:flex; align-items:center; gap:4px"><i style="width:8px; height:8px; background:var(--go); border-radius:2px"></i> OK</span>
        <span style="display:flex; align-items:center; gap:4px"><i style="width:8px; height:8px; background:var(--stop); border-radius:2px"></i> ANOMALIA</span>
        <span style="display:flex; align-items:center; gap:4px"><i style="width:8px; height:8px; background:var(--slate); border-radius:2px"></i> FOLGA</span>
      </div>
    </div>

    <button type="button" id="btn-relatorio" class="btn btn-secondary" onclick="gerarPDF()" style="margin-bottom:10px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      Gerar Relatório em PDF
    </button>
  </form>
</main>

<footer>
  <button type="button" id="btn-enviar" class="btn btn-primary" onclick="enviar()" disabled>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    Salvar Medição
  </button>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>
// ============================================================
// CONFIGURAÇÃO E VARIÁREIS GLOBAIS
// ============================================================
const params = new URLSearchParams(window.location.search);
const CLIENTE = params.get('c') || 'CLIENTE NÃO IDENTIFICADO';
const GESTAO = params.get('g') || 'G01';
const TEM_PH = params.get('ph') === '1';
const TEM_HIDRO = params.get('hidro') === '1';
const PONTOS_STR = params.get('pontos') || '';
const PONTOS = PONTOS_STR ? PONTOS_STR.split(',') : (params.get('p') ? [params.get('p')] : ['SAÍDA DO FILTRO']);

const API_URL = "https://script.google.com/macros/s/AKfycbxoK8Wd_6_CidO7H996G0Bvj8O-tQpE7fQx-D6rV9uA3V8X9E8/exec";

let MODO = 'util';
let calDataAtual = new Date();
let historicoMes = {};

// ============================================================
// INICIALIZAÇÃO
// ============================================================
window.onload = function() {
  document.getElementById('cliente-header').innerText = CLIENTE;
  
  // Bug 4: Fallback localStorage para 'funcionario'
  const funcionarioSalvo = localStorage.getItem('filtratech_funcionario_nome') || localStorage.getItem('filtratech_funcionário_nome');
  if (funcionarioSalvo) {
    document.getElementById('campo-funcionario').value = funcionarioSalvo;
  }

  const hoje = new Date().toISOString().split('T')[0];
  document.getElementById('campo-data').value = hoje;

  // Bug 2: Bloco duplicado removido
  if (TEM_HIDRO) {
    document.getElementById('sec-hidrometro').classList.remove('hidden');
  }

  if (TEM_PH) {
    document.getElementById('campo-ph-container').classList.remove('hidden');
  }

  renderizarPontos();
  calIniciar();
  configurarWhatsApp();
  atualizarBtn();
};

function renderizarPontos() {
  const container = document.getElementById('container-pontos');
  container.innerHTML = '';

  PONTOS.forEach((nome, i) => {
    const html = `
      <div class="ponto-row">
        <span class="ponto-name">${nome}</span>
        <div class="grid-2">
          <div class="input-group" style="margin-bottom:0">
            <input type="text" inputmode="decimal" id="cloro-saida-${i}" placeholder="Saída" oninput="avalCloro(${i})">
          </div>
          <div class="input-group" style="margin-bottom:0">
            <input type="text" inputmode="decimal" id="cloro-consumo-${i}" placeholder="Consumo" oninput="avalCloro(${i})">
          </div>
        </div>
        <div id="resultado-cloro-${i}" class="status-box">--</div>
      </div>
    `;
    container.innerHTML += html;
  });
}

function setModo(m) {
  MODO = m;
  document.getElementById('btn-dia-util').className = (m === 'util' ? 'active' : '');
  document.getElementById('btn-folga').className = (m === 'folga' ? 'active' : '');
  
  document.getElementById('sec-medicao').className = (m === 'util' ? 'card' : 'card hidden');
  document.getElementById('sec-folga').className = (m === 'folga' ? 'card' : 'card hidden');
  
  if (TEM_HIDRO) {
    document.getElementById('sec-hidrometro').className = (m === 'util' ? 'card' : 'card hidden');
  }
  
  atualizarBtn();
}

function avalCloro(idx) {
  const inputS = document.getElementById(`cloro-saida-${idx}`);
  const inputC = document.getElementById(`cloro-consumo-${idx}`);
  const res = document.getElementById(`resultado-cloro-${idx}`);
  
  const vS = parseFloat(inputS.value.replace(',', '.'));
  const vC = parseFloat(inputC.value.replace(',', '.'));
  
  if (isNaN(vS) && isNaN(vC)) {
    res.innerText = "--";
    res.className = "status-box";
    atualizarBtn();
    return;
  }

  const val = isNaN(vC) ? vS : vC;

  // Regra Filtratech: 0.2 a 2.0 (OK), 2.1 a 5.0 (ATENÇÃO), resto FORA
  if (val < 0.2 || val > 5.0) {
    res.innerText = "FORA DO PADRÃO";
    res.className = "status-box erro";
  } else if (val > 2.0) {
    res.innerText = "ATENÇÃO: ACIMA DO RECOMENDADO";
    res.className = "status-box alerta";
  } else {
    res.innerText = "CONFORME (OK)";
    res.className = "status-box sucesso";
  }
  atualizarBtn();
}

function atualizarBtn() {
  const func = document.getElementById('campo-funcionario').value.trim();
  const data = document.getElementById('campo-data').value;
  let pronto = (func !== "" && data !== "");

  if (MODO === 'util') {
    let algumaMedicao = false;
    PONTOS.forEach((_, i) => {
      const vS = document.getElementById(`cloro-saida-${i}`).value;
      const vC = document.getElementById(`cloro-consumo-${i}`).value;
      if (vS || vC) algumaMedicao = true;
    });
    pronto = pronto && algumaMedicao;
  }

  document.getElementById('btn-enviar').disabled = !pronto;
}

// ============================================================
// ENVIO E RESET
// ============================================================
async function enviar() {
  const btn = document.getElementById('btn-enviar');
  const loader = document.getElementById('loading');
  const func = document.getElementById('campo-funcionario').value.trim();
  const data = document.getElementById('campo-data').value;
  
  // Bug 4: Salvar com nova chave 'funcionario'
  localStorage.setItem('filtratech_funcionario_nome', func);
  
  btn.disabled = true;
  loader.style.display = 'flex';

  try {
    const payloads = [];
    const base = {
      action: "adicionar",
      cliente: CLIENTE,
      gestao: GESTAO,
      data: data,
      funcionario: func
    };

    if (MODO === 'folga') {
      payloads.push({
        ...base,
        ponto: "FOLGA",
        cloro: document.getElementById('motivo-folga').value,
        ph: document.getElementById('obs-folga').value || ""
      });
    } else {
      // Bug 3: Removida 'const hidro' externa desnecessária
      PONTOS.forEach((nome, i) => {
        const s = document.getElementById(`cloro-saida-${i}`).value.replace(',', '.');
        const c = document.getElementById(`cloro-consumo-${i}`).value.replace(',', '.');
        const phVal = document.getElementById('campo-ph').value.replace(',', '.');
        const hVal = document.getElementById('campo-hidro') ? document.getElementById('campo-hidro').value.replace(',', '.') : "";
        
        if (s || c) {
          payloads.push({
            ...base,
            ponto: nome,
            cloro: c || s,
            ph: phVal || "",
            hidro: hVal || ""
          });
        }
      });
    }

    for (let p of payloads) {
      const url = `${API_URL}?${new URLSearchParams(p).toString()}`;
      await fetch(url, { mode: 'no-cors' });
    }

    feedback("Dados salvos com sucesso!", "var(--go)");
    resetForm();
    calCarregar();
  } catch (e) {
    feedback("Erro ao salvar dados.", "var(--stop)");
  } finally {
    loader.style.display = 'none';
  }
}

function resetForm() {
  const form = document.getElementById('form-cloro');
  form.reset();
  
  // Bug 5: Restaurar funcionário após reset
  const funcionarioSalvo = localStorage.getItem('filtratech_funcionario_nome') || localStorage.getItem('filtratech_funcionário_nome');
  if (funcionarioSalvo) {
    document.getElementById('campo-funcionario').value = funcionarioSalvo;
  }

  const hoje = new Date().toISOString().split('T')[0];
  document.getElementById('campo-data').value = hoje;
  
  PONTOS.forEach((_, i) => {
    const res = document.getElementById(`resultado-cloro-${i}`);
    if(res) { res.innerText = "--"; res.className = "status-box"; }
  });
  
  setModo('util');
}

function feedback(txt, cor) {
  const f = document.getElementById('msg-feedback');
  f.innerText = txt;
  f.style.backgroundColor = cor;
  f.style.display = 'block';
  setTimeout(() => f.style.display = 'none', 3000);
}

// ============================================================
// CALENDÁRIO E HISTÓRICO
// ============================================================
function calIniciar() {
  calCarregar();
}

function calNavegar(dir) {
  calDataAtual.setMonth(calDataAtual.getMonth() + dir);
  calCarregar();
}

async function calCarregar() {
  const mes = calDataAtual.getMonth() + 1;
  const ano = calDataAtual.getFullYear();
  const labelMeses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  document.getElementById('cal-mes-ano').innerText = `${labelMeses[mes-1]} ${ano}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '<div class="cal-day-label">Dom</div><div class="cal-day-label">Seg</div><div class="cal-day-label">Ter</div><div class="cal-day-label">Qua</div><div class="cal-day-label">Qui</div><div class="cal-day-label">Sex</div><div class="cal-day-label">Sáb</div>';

  // Buscar dados do mês na API
  try {
    const resp = await fetch(`${API_URL}?action=buscarMes&cliente=${encodeURIComponent(CLIENTE)}&mes=${mes}&ano=${ano}`);
    const dados = await resp.json();
    historicoMes = dados;
  } catch(e) {
    historicoMes = {};
  }

  const primeiroDia = new Date(ano, mes-1, 1).getDay();
  const diasNoMes = new Date(ano, mes, 0).getDate();

  for (let i=0; i<primeiroDia; i++) grid.innerHTML += '<div class="cal-day empty"></div>';

  for (let dia=1; dia<=diasNoMes; dia++) {
    const dataStr = `${ano}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
    const dadosDia = historicoMes[dataStr];
    
    let classe = "cal-day";
    if (dadosDia) {
      if (dadosDia.folga) classe += " is-folga";
      else if (dadosDia.anomalia) classe += " has-anomalia";
      else classe += " has-data";
    }
    
    const hojeStr = new Date().toISOString().split('T')[0];
    if (dataStr === hojeStr) classe += " today";

    grid.innerHTML += `<div class="${classe}" onclick="preencherData('${dataStr}')">${dia}</div>`;
  }
}

function preencherData(d) {
  document.getElementById('campo-data').value = d;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// PDF (jsPDF)
// ============================================================
async function gerarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const W = doc.internal.pageSize.getWidth();
  const margem = 15;

  // Header PDF
  doc.setFillColor(27, 94, 32);
  doc.rect(0, 0, W, 40, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text('Relatório de Monitoramento de Cloro', margem, 20);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text(CLIENTE, margem, 28);

  const mesRef = calDataAtual.getMonth() + 1;
  const anoRef = calDataAtual.getFullYear();
  const dataIni = `01/${String(mesRef).padStart(2,'0')}/${anoRef}`;
  const dataFim = `${new Date(anoRef, mesRef, 0).getDate()}/${String(mesRef).padStart(2,'0')}/${anoRef}`;

  // Tabela de Dados
  const head = [['Data', 'Ponto', 'Cloro', 'pH', 'Hidrômetro', 'Status', 'Responsável']];
  const body = [];
  let anomalias = 0;
  let total = 0;
  let semMed = 0;

  const datasOrdenadas = Object.keys(historicoMes).sort();
  datasOrdenadas.forEach(dt => {
    const d = historicoMes[dt];
    const dataFormat = dt.split('-').reverse().join('/');
    
    if (d.folga) {
      body.push([dataFormat, d.folgaMotivo || 'FOLGA', '-', '-', '-', 'N/A', '-']);
    } else {
      d.medicoes.forEach(m => {
        total++;
        const val = parseFloat(String(m.cloro).replace(',','.'));
        const phVal = parseFloat(String(m.ph).replace(',','.'));
        
        // Bug 6: Lógica PDF atualizada conforme Filtratech (0.2 a 5.0)
        let status = 'OK';
        if (val < 0.2 || val > 5.0) {
           status = 'FORA';
           anomalias++;
        } else if (val > 2.0) {
           status = 'ATENÇÃO';
        }

        // Checar pH
        if (phVal && (phVal < 6.0 || phVal > 9.5)) {
           if (status !== 'FORA') anomalias++;
           status = 'FORA (pH)';
        }

        body.push([
          dataFormat,
          m.ponto,
          m.cloro + ' mg/L',
          m.ph ? m.ph : '-',
          m.hidro ? m.hidro : '-',
          status,
          m.funcionario
        ]);
      });
    }
  });

  doc.autoTable({
    head: head,
    body: body,
    startY: 45,
    theme: 'grid',
    styles: { fontSize: 7, cellPadding: 2 },
    headStyles: { fillColor: [27, 94, 32] },
    didDrawCell: (data) => {
      if (data.section === 'body' && data.column.index === 5) {
        if (data.cell.raw.includes('FORA')) doc.setTextColor(185, 28, 28);
        else if (data.cell.raw === 'ATENÇÃO') doc.setTextColor(180, 83, 9);
        else if (data.cell.raw === 'OK') doc.setTextColor(27, 122, 64);
      }
    }
  });

  const finalY = doc.lastAutoTable.finalY + 10;
  doc.setFontSize(9);
  doc.setTextColor(50, 50, 50);
  doc.text('Resumo do Período:', margem, finalY);
  doc.text('Total de medições: ' + total, margem + 4, finalY + 7);
  doc.text('Anomalias: ' + anomalias, margem + 55, finalY + 7);
  
  // Rodapé
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(7);
    doc.setTextColor(150, 150, 150);
    doc.text('Filtratech Ambiental — Monitoramento conforme Portaria GM/MS nº 888/2021', margem, 285);
    doc.text('Página ' + i + ' de ' + pageCount, W - margem - 15, 285);
  }

  doc.save(`Relatorio_Filtratech_${CLIENTE.replace(/\s+/g,'_')}.pdf`);
}
